# D-FINE HGNetv2-L config for inference (merged, no __include__).
# Derived from TCB/models/DFINE/configs/dfine_hgnetv2_l_custom.yml
# + TCB/data/configs/custom_detection.yml (inference-relevant fields only).

task: detection
num_classes: 5
eval_spatial_size: [720, 1280]

model: DFINE
postprocessor: DFINEPostProcessor
use_focal_loss: True

DFINE:
  backbone: DFINEHGNetv2
  encoder: DFINEHybridEncoder
  decoder: DFINETransformer

DFINEHGNetv2:
  pretrained: False
  name: 'B4'
  return_idx: [1, 2, 3]
  freeze_stem_only: True
  freeze_at: 0
  freeze_norm: True

DFINEHybridEncoder:
  in_channels: [512, 1024, 2048]
  feat_strides: [8, 16, 32]

  # intra
  hidden_dim: 256
  use_encoder_idx: [2]
  num_encoder_layers: 1
  nhead: 8
  dim_feedforward: 1024
  dropout: 0.
  enc_act: 'gelu'

  # cross
  expansion: 1.0
  depth_mult: 1
  act: 'silu'

DFINETransformer:
  feat_channels: [256, 256, 256]
  feat_strides: [8, 16, 32]
  hidden_dim: 256
  num_levels: 3

  num_layers: 6
  eval_idx: -1
  num_queries: 300

  num_denoising: 100
  label_noise_ratio: 0.5
  box_noise_scale: 1.0

  reg_max: 32
  reg_scale: 4
  layer_scale: 1

  num_points: [3, 6, 3]
  cross_attn_method: custom
  query_select_method: default

DFINEPostProcessor:
  num_top_queries: 300

DFINECriterion:
  weight_dict: {loss_vfl: 1, loss_bbox: 5, loss_giou: 2, loss_fgl: 0.15, loss_ddf: 1.5}
  losses: ['vfl', 'boxes', 'local']
  alpha: 0.75
  gamma: 2.0
  reg_max: 32

  matcher:
    type: DFINEHungarianMatcher
    weight_dict: {cost_class: 2, cost_bbox: 5, cost_giou: 2}
    alpha: 0.25
    gamma: 2.0
